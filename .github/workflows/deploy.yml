name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject auth hashes from secrets
        env:
          ADMIN_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          VIEWER_HASH: ${{ secrets.VIEWER_PASSWORD_HASH }}
        run: |
          sed -i "s/__ADMIN_HASH__/${ADMIN_HASH}/g" auth-config.js
          sed -i "s/__VIEWER_HASH__/${VIEWER_HASH}/g" auth-config.js
          echo "Auth hashes injected into auth-config.js"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
