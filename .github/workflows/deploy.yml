name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject auth hashes from secrets
        env:
          ADMIN_HASH: ${{ secrets.ADMIN_PASSWORD_HASH }}
          VIEWER_HASH: ${{ secrets.VIEWER_PASSWORD_HASH }}
        run: |
          DEFAULT_ADMIN="240be518fabd2724ddb6f04eeb1da5967448d7e831c08c8fa822809f74c720a9"
          DEFAULT_VIEWER="65375049b9e4d7cad6c9ba286fdeb9394b28135a3e84136404cfccfdcc438894"
          FINAL_ADMIN=${ADMIN_HASH:-$DEFAULT_ADMIN}
          FINAL_VIEWER=${VIEWER_HASH:-$DEFAULT_VIEWER}
          if [ "${#FINAL_ADMIN}" -ne 64 ]; then FINAL_ADMIN=$DEFAULT_ADMIN; fi
          if [ "${#FINAL_VIEWER}" -ne 64 ]; then FINAL_VIEWER=$DEFAULT_VIEWER; fi
          sed -i "s/__ADMIN_HASH__/${FINAL_ADMIN}/g" auth-config.js
          sed -i "s/__VIEWER_HASH__/${FINAL_VIEWER}/g" auth-config.js
          echo "Auth hashes injected (admin len=${#FINAL_ADMIN}, viewer len=${#FINAL_VIEWER})"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
