<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DIPCC Classroom</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg-dark,#0d1117); }
    .login-card { background:var(--card-bg,#161b22); border:1px solid var(--border,#30363d); border-radius:12px; padding:2.5rem 2rem; width:100%; max-width:380px; box-shadow:0 8px 32px rgba(0,0,0,.4); }
    .login-card h1 { font-size:1.5rem; color:var(--accent,#4fc3f7); margin-bottom:.25rem; }
    .login-card p { color:#8b949e; font-size:.875rem; margin-bottom:1.5rem; }
    .login-card label { display:block; color:#c9d1d9; font-size:.875rem; margin-bottom:.4rem; }
    .login-card input { width:100%; padding:.65rem .9rem; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#c9d1d9; font-size:1rem; box-sizing:border-box; margin-bottom:1rem; }
    .login-card input:focus { outline:none; border-color:#4fc3f7; }
    .btn-primary { width:100%; padding:.75rem; background:var(--accent,#4fc3f7); color:#0d1117; font-weight:700; font-size:1rem; border:none; border-radius:6px; cursor:pointer; }
    .btn-primary:hover { background:#29b6f6; }
    .error-msg { color:#f85149; font-size:.85rem; text-align:center; margin-top:.75rem; display:none; }
    .role-tabs { display:flex; gap:.5rem; margin-bottom:1.5rem; }
    .role-tab { flex:1; padding:.5rem; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#8b949e; cursor:pointer; font-size:.85rem; text-align:center; }
    .role-tab.active { border-color:#4fc3f7; color:#4fc3f7; background:#111827; }
    .admin-link { display:block; text-align:center; margin-top:1rem; color:#8b949e; font-size:.8rem; }
    .admin-link a { color:#4fc3f7; text-decoration:none; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>&#x1F393; DIPCC Classroom</h1>
    <p>Sign in to access classroom information.</p>
    <div class="role-tabs">
      <div class="role-tab active" id="tab-viewer" onclick="setRole('viewer')">Student / Viewer</div>
      <div class="role-tab" id="tab-admin" onclick="setRole('admin')">Admin</div>
    </div>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" autofocus>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="error-msg">Incorrect password. Please try again.</div>
  </div>
  <script>
    let currentRole = 'viewer';
    function setRole(role) {
      currentRole = role;
      document.getElementById('tab-viewer').classList.toggle('active', role === 'viewer');
      document.getElementById('tab-admin').classList.toggle('active', role === 'admin');
    }
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }
    async function doLogin() {
      const pwd = document.getElementById('password').value;
      if (!pwd) return;
      const hash = await sha256(pwd);
      const adminHash = window.ADMIN_HASH || '';
      const viewerHash = window.VIEWER_HASH || '';
      if (currentRole === 'admin' && hash === adminHash) {
        sessionStorage.setItem('dipcc_role', 'admin');
        sessionStorage.setItem('dipcc_auth', '1');
        window.location.href = 'admin.html';
      } else if (currentRole === 'viewer' && hash === viewerHash) {
        sessionStorage.setItem('dipcc_role', 'viewer');
        sessionStorage.setItem('dipcc_auth', '1');
        window.location.href = 'index.html';
      } else {
        document.getElementById('error-msg').style.display = 'block';
      }
    }
    document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    if (sessionStorage.getItem('dipcc_auth') === '1') {
      const role = sessionStorage.getItem('dipcc_role');
      window.location.href = role === 'admin' ? 'admin.html' : 'index.html';
    }
  </script>
  <script src="auth-config.js"></script>
</body>
</html>
